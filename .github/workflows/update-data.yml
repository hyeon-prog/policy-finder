name: Update policy data

# 매일 06:00 KST(21:00 UTC)에 온통청년 API에서 최신 정책을 받아
# data/policies.json을 갱신합니다. 수동 실행: Actions 탭 → Run workflow
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest policies from youthcenter API
        env:
          YOUTH_API_KEY: ${{ secrets.YOUTH_API_KEY }}
        run: node scripts/fetch-policies.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/policies.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update policy data ($(date -u '+%Y-%m-%d'))"
            git push
          fi
